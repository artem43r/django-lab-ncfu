{% extends 'base.html' %}

{% block title %}
    Обратная связь :: {{ block.super }}
{% endblock %}

{% block sidebar %}
    {% include 'inc/_sidebar.html' %}
{% endblock %}

{% block content %}
    {% if form.errors %}
        <div class="alert alert-danger" role="alert">
            Ошибка заполнения
        </div>
    {% endif %}

    <h1>Обратная связь</h1>

    <form action="{% url 'contact' %}" method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Отправить письмо
        </button>

    </form>

{% endblock %}
