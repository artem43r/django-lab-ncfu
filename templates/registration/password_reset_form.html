{% extends 'base.html' %}

{% block title %}
Восстановление пароля
{% endblock %}

{% block sidebar %}
{% endblock %}

{% block content %}

<h1>Восстановление пароля</h1>

<form method="post">

    {% csrf_token %}

    <p>
        {{ form.email.label_tag }}
        {{ form.email }}
    </p>

    <p>
        {{ form.captcha.label_tag }}
        {{ form.captcha }}
    </p>

    <button type="submit" class="btn btn-primary">
        Отправить
    </button>

</form>

{% endblock %}
